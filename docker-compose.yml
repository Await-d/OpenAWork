services:
  gateway:
    build:
      context: .
      dockerfile: services/agent-gateway/Dockerfile
    ports:
      - '3000:3000'
    environment:
      GATEWAY_PORT: 3000
      GATEWAY_HOST: 0.0.0.0
      JWT_SECRET: change-me-in-production-min-32-chars
      JWT_EXPIRES_IN: 15m
      OPENAWORK_DATA_DIR: /var/lib/openawork
      REDIS_URL: redis://redis:6379
    volumes:
      - gateway_data:/var/lib/openawork
    depends_on:
      redis:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - '5173:80'
    depends_on:
      - gateway

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  gateway_data:
