name: Release Desktop

on:
  push:
    tags:
      - 'desktop-v*'
  workflow_dispatch:
    inputs:
      channel:
        description: 'Update channel'
        required: true
        default: 'preview'
        type: choice
        options:
          - preview
          - stable
      release_notes_body:
        description: '完整发布稿正文（手动触发时必填；标准流程由 Prepare Release 自动传入）'
        required: true
        type: string

jobs:
  resolve-release-notes:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      release_tag: ${{ steps.meta.outputs.release_tag }}
      release_name: ${{ steps.meta.outputs.release_name }}
      release_channel: ${{ steps.meta.outputs.release_channel }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Materialize release notes body
        env:
          RELEASE_NOTES_BODY: ${{ inputs.release_notes_body }}
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            git tag -l --format='%(contents)' "${GITHUB_REF_NAME}" > release-notes.md
          else
            printf '%s' "$RELEASE_NOTES_BODY" > release-notes.md
          fi

      - name: Validate release notes body
        run: node scripts/release-notes.mjs inspect --body-file release-notes.md

      - name: Resolve desktop release metadata
        id: meta
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            VERSION=$(node -e "const match = /desktop-v(\d+\.\d+\.\d+)(-preview)?$/.exec(process.env.GITHUB_REF_NAME || ''); if (!match) process.exit(1); process.stdout.write(match[1]);")
            CHANNEL=$([[ "${GITHUB_REF_NAME}" == *-preview ]] && printf 'preview' || printf 'stable')
            RELEASE_TAG="${GITHUB_REF_NAME}"
          else
            VERSION=$(node -p "JSON.parse(require('node:fs').readFileSync('package.json', 'utf8')).version")
            CHANNEL="${{ inputs.channel }}"
            RELEASE_TAG="desktop-v${VERSION}"
            if [[ "$CHANNEL" == "preview" ]]; then
              RELEASE_TAG="desktop-v${VERSION}-preview"
            fi
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "release_tag=$RELEASE_TAG" >> "$GITHUB_OUTPUT"
          echo "release_name=OpenAWork Desktop ${RELEASE_TAG}" >> "$GITHUB_OUTPUT"
          echo "release_channel=$CHANNEL" >> "$GITHUB_OUTPUT"

      - name: Upload release notes artifact
        uses: actions/upload-artifact@v4
        with:
          name: desktop-release-notes
          path: release-notes.md

  build:
    name: Build ${{ matrix.label }}
    needs: resolve-release-notes
    permissions:
      contents: write
    env:
      MACOS_CERTIFICATE_PRESENT: ${{ secrets.MACOS_CERTIFICATE != '' }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macos-aarch64
            runner: macos-latest
            args: '--target aarch64-apple-darwin'
            rust_targets: 'aarch64-apple-darwin'
          - label: windows
            runner: windows-latest
            args: ''
            rust_targets: ''
          - label: linux
            runner: ubuntu-22.04
            args: ''
            rust_targets: ''
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - uses: actions/download-artifact@v4
        with:
          name: desktop-release-notes
          path: temp/release-notes

      - name: Install Linux system deps
        if: matrix.runner == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust_targets }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Import macOS signing cert
        if: matrix.runner == 'macos-latest' && env.MACOS_CERTIFICATE_PRESENT == 'true'
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.MACOS_CERTIFICATE }}
          p12-password: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}

      - name: Read release notes body from repository
        id: notes_body
        shell: bash
        run: |
          NOTES_FILE="temp/release-notes/release-notes.md"
          DELIMITER=$(node -e "process.stdout.write('EOF_' + Math.random().toString(16).slice(2))")
          echo "notes<<${DELIMITER}" >> "$GITHUB_OUTPUT"
          cat "$NOTES_FILE" >> "$GITHUB_OUTPUT"
          printf '\n' >> "$GITHUB_OUTPUT"
          echo "${DELIMITER}" >> "$GITHUB_OUTPUT"

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          APPLE_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          projectPath: apps/desktop
          args: ${{ matrix.args }}
          tagName: ${{ needs.resolve-release-notes.outputs.release_tag }}
          releaseName: ${{ needs.resolve-release-notes.outputs.release_name }}
          releaseBody: ${{ steps.notes_body.outputs.notes || inputs.channel }}
          releaseDraft: false
          prerelease: ${{ needs.resolve-release-notes.outputs.release_channel == 'preview' }}
          includeUpdaterJson: true

      - name: Upload desktop installers
        uses: actions/upload-artifact@v4
        with:
          name: desktop-installers-${{ matrix.label }}
          path: apps/desktop/src-tauri/target/release/bundle/
          if-no-files-found: error
          retention-days: 14

  publish-release-notes:
    name: Publish Aggregate Release Summary
    runs-on: ubuntu-latest
    needs: [resolve-release-notes, build]
    if: ${{ always() && needs.resolve-release-notes.result == 'success' }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: desktop-release-notes
          path: temp/release-notes

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Resolve desktop release state
        id: release_state
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh api "repos/${GITHUB_REPOSITORY}/releases/tags/${{ needs.resolve-release-notes.outputs.release_tag }}" > release.json 2>/dev/null; then
            echo "release_found=true" >> "$GITHUB_OUTPUT"
          else
            echo "release_found=false" >> "$GITHUB_OUTPUT"
            printf '{}\n' > release.json
          fi

      - name: Build desktop release summary
        env:
          NOTES_FILE: temp/release-notes/release-notes.md
        run: |
          node scripts/release-result-summary.mjs print \
            --target desktop \
            --base-file "$NOTES_FILE" \
            --input-file release.json \
            --version "${{ needs.resolve-release-notes.outputs.release_tag }}" \
            --channel "${{ needs.resolve-release-notes.outputs.release_channel }}" \
            --output-file release-body-final.md >/dev/null

          node scripts/release-aggregate-summary.mjs print \
            --base-file "$NOTES_FILE" \
            --desktop-file release-body-final.md \
            --version "${{ needs.resolve-release-notes.outputs.version }}" \
            --output-file release-aggregate-summary.md >/dev/null

      - name: Append desktop aggregate summary to workflow summary
        run: cat release-aggregate-summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload desktop release summary artifact
        uses: actions/upload-artifact@v4
        with:
          name: desktop-release-summary
          path: release-body-final.md

      - name: Upload aggregate release summary artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-aggregate-summary
          path: release-aggregate-summary.md

      - name: Update GitHub release body
        if: ${{ steps.release_state.outputs.release_found == 'true' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release edit "${{ needs.resolve-release-notes.outputs.release_tag }}" --notes-file release-aggregate-summary.md
