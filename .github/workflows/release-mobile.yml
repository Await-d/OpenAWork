name: Release Mobile

on:
  push:
    tags:
      - 'mobile-v*'
  workflow_dispatch:
    inputs:
      profile:
        description: 'EAS build profile'
        required: true
        default: 'preview'
        type: choice
        options:
          - preview
          - production
      platform:
        description: 'Platform to build'
        required: true
        default: 'all'
        type: choice
        options:
          - all
          - ios
          - android
      release_notes_body:
        description: '完整发布稿正文（手动触发时必填；标准流程由 Prepare Release 自动传入）'
        required: true
        type: string
jobs:
  resolve-release-notes:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.notes.outputs.version }}
      summary_line: ${{ steps.notes.outputs.summary_line }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Materialize release notes body
        env:
          RELEASE_NOTES_BODY: ${{ inputs.release_notes_body }}
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            git tag -l --format='%(contents)' "${GITHUB_REF_NAME}" > release-notes.md
          else
            printf '%s' "$RELEASE_NOTES_BODY" > release-notes.md
          fi

      - name: Resolve release notes metadata
        id: notes
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            VERSION=$(node -e "const match = /mobile-v(\\d+\\.\\d+\\.\\d+)(?:-preview)?/.exec(process.env.GITHUB_REF_NAME || ''); if (!match) process.exit(1); process.stdout.write(match[1]);")
          else
            VERSION=$(node -p "JSON.parse(require('node:fs').readFileSync('apps/mobile/package.json', 'utf8')).version")
          fi
          NOTES_JSON=$(node scripts/release-notes.mjs inspect --body-file release-notes.md)
          SUMMARY_LINE=$(node -e "const data = JSON.parse(process.argv[1]); process.stdout.write(data.summaryLine);" "$NOTES_JSON")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "summary_line=$SUMMARY_LINE" >> "$GITHUB_OUTPUT"

      - name: Upload release notes artifact
        uses: actions/upload-artifact@v4
        with:
          name: mobile-release-notes
          path: release-notes.md

  build:
    name: EAS Build (${{ inputs.platform || 'all' }})
    runs-on: ubuntu-latest
    needs: resolve-release-notes
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - uses: actions/download-artifact@v4
        with:
          name: mobile-release-notes
          path: temp/release-notes

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: EAS Build
        working-directory: apps/mobile
        run: |
          PROFILE=${{ inputs.profile || 'preview' }}
          PLATFORM=${{ inputs.platform || 'all' }}
          eas build --profile $PROFILE --platform $PLATFORM --non-interactive --json > eas-build-results.json
          cat eas-build-results.json
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          ASC_APP_ID: ${{ secrets.ASC_APP_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Upload EAS build results
        uses: actions/upload-artifact@v4
        with:
          name: eas-build-results
          path: apps/mobile/eas-build-results.json

  ota:
    name: Push OTA Update
    runs-on: ubuntu-latest
    needs: [resolve-release-notes, build]
    if: ${{ inputs.profile == 'preview' || inputs.profile == 'production' || startsWith(github.ref, 'refs/tags/mobile-v') }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Push OTA to preview channel
        if: ${{ inputs.profile == 'preview' }}
        working-directory: apps/mobile
        run: eas update --channel preview --message "${{ needs.resolve-release-notes.outputs.summary_line }}" --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

      - name: Push OTA to production channel
        if: ${{ inputs.profile == 'production' || startsWith(github.ref, 'refs/tags/mobile-v') }}
        working-directory: apps/mobile
        run: eas update --channel production --message "${{ needs.resolve-release-notes.outputs.summary_line }}" --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

  submit:
    name: Submit to Stores
    runs-on: ubuntu-latest
    needs: [resolve-release-notes, build]
    if: ${{ inputs.profile == 'production' || startsWith(github.ref, 'refs/tags/mobile-v') }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: EAS Submit iOS
        working-directory: apps/mobile
        run: eas submit --platform ios --latest --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          ASC_APP_ID: ${{ secrets.ASC_APP_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: EAS Submit Android
        working-directory: apps/mobile
        run: eas submit --platform android --latest --non-interactive
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}

  publish-release-notes:
    name: Publish Release Notes Summary
    runs-on: ubuntu-latest
    needs: [resolve-release-notes, build]
    if: ${{ always() }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - uses: actions/download-artifact@v4
        with:
          name: mobile-release-notes
          path: temp/release-notes

      - uses: actions/download-artifact@v4
        with:
          if-no-files-found: ignore
          name: eas-build-results
          path: temp/eas-build-results

      - name: Build unified mobile release summary
        run: |
          CHANNEL=preview
          if [[ "${GITHUB_REF_NAME}" == mobile-v* ]] || [[ "${{ inputs.profile }}" == "production" ]]; then
            CHANNEL=production
          fi
          node scripts/release-result-summary.mjs print \
            --target mobile \
            --base-file temp/release-notes/release-notes.md \
            --input-file temp/eas-build-results/eas-build-results.json \
            --version "${{ needs.resolve-release-notes.outputs.version }}" \
            --channel "$CHANNEL" \
            --output-file mobile-release-summary.md >/dev/null

      - name: Append unified mobile release summary to workflow summary
        run: cat mobile-release-summary.md >> "$GITHUB_STEP_SUMMARY"

      - name: Upload mobile release summary artifact
        uses: actions/upload-artifact@v4
        with:
          name: mobile-release-summary
          path: mobile-release-summary.md
